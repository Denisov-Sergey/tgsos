services:
  app:
    build: .
    container_name: tgsos-app
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////data/tgsos.db}
      - TELEGRAM_SESSION_PATH=${TELEGRAM_SESSION_PATH:-/data/telethon_session}
    volumes:
      - tgsos_data:/data
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # Сбор постов. Первая авторизация (код приходит в приложение Telegram, не по SMS):
  #   docker compose run --rm -it collector
  # Дальше по требованию: docker compose run --rm collector
  collector:
    build: .
    container_name: tgsos-collector
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////data/tgsos.db}
      - TELEGRAM_SESSION_PATH=${TELEGRAM_SESSION_PATH:-/data/telethon_session}
    volumes:
      - tgsos_data:/data
    profiles:
      - tools
    command: python -m collector.run ${COLLECTOR_LIMIT:-200}

volumes:
  tgsos_data:
